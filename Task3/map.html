<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task 3 - Parking Map</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="wrap">
      <h1>Parking Lot Selector</h1>

      <section class="legend">
        <span class="chip available">available</span>
        <span class="chip occupied">occupied</span>
        <span class="chip selected">selected</span>
      </section>

      <section class="summary" id="summary"></section>
      <p class="error" id="errorMsg"></p>

      <section class="map-grid" id="mapGrid"></section>
    </main>

    <script src="./map.js"></script>
  </body>
</html>
